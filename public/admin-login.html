<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{
background:#111;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
background:#1c1c1c;
padding:40px;
border-radius:10px;
border:1px solid gold;
width:300px;
text-align:center;
}

h2{
margin-bottom:20px;
color:gold;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:gold;
border:none;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffd700;
}

.back{
margin-top:15px;
display:block;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<a href="booking.html" class="back">← Back to Booking</a>

</div>

<script>

function login(){

let u = document.getElementById("user").value
let p = document.getElementById("pass").value

if(u == "admin" && p == "1234"){

// store login session
sessionStorage.setItem("adminLoggedIn","true")

// open admin dashboard
window.location = "admin.html"

}
else{

alert("Invalid username or password")

}

}

</script>

</body>

</html>
